site_name: 이윤호 · Applied AI Engineer
site_url: https://leeyunhome.github.io/portfolio/
repo_url: https://github.com/leeyunhome
repo_name: leeyunhome
docs_dir: docs

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

plugins:
  - search:
      lang: ko

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list

nav:
  - 홈: index.md
  - 프로필: about.md
  - 기술 역량: skills.md
  - 케이스 스터디:
    - "CS1 · SoC 비전 데이터 무결성": cases/01-soc-vision-integrity.md
    - "CS2 · 93일 에이징 테스트": cases/02-aging-test.md
    - "CS3 · VLM/VLA Edge 추론": cases/03-vlm-edge.md
    - "CS4 · SW 품질 및 보안 관리": cases/04-sw-quality.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/leeyunhome
      name: GitHub
